version: '3.8'

# Production Docker Compose for cloud deployment
# Use this for testing production builds locally

services:
  mongodb:
    image: mongo:7
    container_name: devpulse-mongo-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: devpulse
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - devpulse-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Remove external port exposure for production
    # ports:
    #   - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devpulse?authSource=admin
      METRIC_INTERVAL_MS: ${METRIC_INTERVAL_MS:-2000}
      METRIC_PERSIST_MS: ${METRIC_PERSIST_MS:-10000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - devpulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devpulse-frontend-prod
    restart: unless-stopped
    environment:
      # Build-time environment variables for Vite
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_SOCKET_PATH: ${VITE_SOCKET_PATH:-/socket.io}
    depends_on:
      - backend
    networks:
      - devpulse-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  devpulse-network:
    driver: bridge